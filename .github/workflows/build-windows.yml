name: Build Mixxx Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2025-vs2026
    name: Windows x64 Installer

    steps:
      - name: "Check out repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "[Windows] Set up MSVC Developer Command Prompt"
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: "[Windows] Get build environment name"
        shell: cmd
        run: tools\windows_buildenv.bat name

      - name: "[Windows] Set up build environment"
        shell: cmd
        run: tools\windows_buildenv.bat setup
        env:
          BUILDENV_BASEPATH: C:\buildenv
          BUILDENV_RELEASE: TRUE

      - name: "Create build directory"
        run: mkdir build

      - name: "Configure"
        shell: cmd
        run: >-
          cmake
          -DBULK=ON
          -DHSS1394=ON
          -DLOCALECOMPARE=ON
          -DMAD=ON
          -DMEDIAFOUNDATION=ON
          -DMODPLUG=ON
          -DQT6=ON
          -DQML=ON
          -DWAVPACK=ON
          -DVCPKG_TARGET_TRIPLET=x64-windows-release
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DCMAKE_PREFIX_PATH="%CMAKE_PREFIX_PATH%"
          -DWARNINGS_FATAL=OFF
          -DDEBUG_ASSERTIONS_FATAL=OFF
          -DBATTERY=ON
          -DBROADCAST=ON
          -DDOWNLOAD_MANUAL=ON
          -DHID=ON
          -DKEYFINDER=OFF
          -DLILV=ON
          -DOPUS=ON
          -DQTKEYCHAIN=ON
          -DVINYLCONTROL=ON
          -DCMAKE_VERBOSE_MAKEFILE=OFF
          -L
          ..
        working-directory: build

      - name: "Build"
        run: cmake --build . --config RelWithDebInfo
        working-directory: build

      - name: "Deploy Qt and copy res/"
        shell: powershell
        run: |
          $buildDir = $null
          foreach ($d in @("build\Release", "build\RelWithDebInfo", "build")) {
            if (Test-Path "$d\mixxx.exe") { $buildDir = $d; break }
          }
          if (-not $buildDir) { Write-Error "mixxx.exe not found"; exit 1 }
          Write-Host "Build output: $buildDir"

          if (Test-Path "res") {
            Copy-Item -Recurse -Force "res" "$buildDir\res"
            Write-Host "Copied res/"
          }

          $qtPlugins = $null
          foreach ($base in @("C:\buildenv", $env:BUILDENV_BASEPATH)) {
            if (-not (Test-Path $base)) { continue }
            $found = Get-ChildItem -Path $base -Recurse -Filter "qwindows.dll" -ErrorAction SilentlyContinue | Where-Object { $_.FullName -match "platforms" } | Select-Object -First 1
            if ($found) { $qtPlugins = $found; break }
          }

          if ($qtPlugins) {
            $platDir = Join-Path $buildDir "platforms"
            New-Item -ItemType Directory -Force -Path $platDir | Out-Null
            Copy-Item $qtPlugins.FullName "$platDir\qwindows.dll"
            Write-Host "Copied qwindows.dll from $($qtPlugins.FullName)"

            $qtPluginsRoot = (Get-Item $qtPlugins.FullName).Directory.Parent.FullName
            foreach ($subdir in @("imageformats","styles","iconengines","bearer","generic","networkinformation","platforminputcontexts","position","printsupport","renderplugins","scenegraph","sensors","sqldrivers","texttospeech","virtualkeyboard","xcbglintegrations","egldeviceintegrations")) {
              $src = Join-Path $qtPluginsRoot $subdir
              if (Test-Path $src -PathType Container) {
                $dst = Join-Path $buildDir $subdir
                Copy-Item -Recurse -Force $src $dst
                Write-Host "Copied $subdir"
              }
            }

            $qtBase = $qtPluginsRoot.Parent.Parent
            foreach ($subdir in @("qml","translations","resources")) {
              $src = Join-Path $qtBase $subdir
              if (Test-Path $src -PathType Container) {
                $dst = Join-Path $buildDir $subdir
                Copy-Item -Recurse -Force $src $dst
                Write-Host "Copied $subdir"
              }
            }
          } else {
            Write-Host "WARNING: qwindows.dll not found in buildenv"
          }

          $wdq = Get-ChildItem -Path "C:\buildenv" -Recurse -Filter "windeployqt.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($wdq) {
            Write-Host "Running windeployqt..."
            & $wdq.FullName "$buildDir\mixxx.exe" 2>&1
          }

      - name: "Zip Mixxx"
        shell: powershell
        run: |
          cd build
          $items = Get-ChildItem -Path . -Exclude "CMakeFiles","CMakeCache.txt","*.obj","*.log","buildenv","_deps" | Select-Object -ExpandProperty Name
          Compress-Archive -Path $items -DestinationPath "Mixxx-BeatRepeat.zip" -Force

      - name: "Upload Mixxx"
        uses: actions/upload-artifact@v4
        with:
          name: Mixxx-BeatRepeat-Windows-x64
          path: build/Mixxx-BeatRepeat.zip
          if-no-files-found: error
